<div  [style.font-family]="FontFamily"  [id]="Id" style="display: flex;" 
        [ngStyle]="{'width': _totalWidth,
            'pointer-events': (IsReadOnly || IsDisabled) ? 'none': '', 'user-select': IsDisabled ? 'none': 'auto' 
         }">
    <div class="sbox sli">

        <div class="box" (click)="clickOnBar($event)" [ngStyle]="{
            'background-color': EnableEmptyPathColor ? EmptyTrackColor : 'transparent',
            'width': _sliderBarWidthVM, 
            'height': _sliderBarHeightVM }"></div>
        
        
        <div class="cbox" 
            [ngStyle]="{ 'background-color': EnablePathColor ? TrackColor : 'transparent', 
                'margin-left':Slider1MarginLeft,
                'width':MiddleBarWidth+'px', 'height': _sliderBarHeightVM }"></div>

        <div #slider1 class="slider" [ngStyle]="{'background-color': Slider1Color,
            'height': _sliderMarkerSizeVM, 'width': _sliderMarkerSizeVM, 'top': getMarkerTop() }" cdkDragLockAxis="x" cdkDrag
         (cdkDragMoved)="dragMove1($event)" (cdkDragStarted)="dragStarted1($event)"            
            (cdkDragReleased)="dragEnded1($event)">
        </div>


        <div #slider2 class="slider" [ngStyle]="{'background-color': Slider2Color,
            'height': _sliderMarkerSizeVM, 'width': _sliderMarkerSizeVM, 'top': getMarkerTop() }" cdkDragLockAxis="x" cdkDrag
            (cdkDragMoved)="dragMove($event)" (cdkDragStarted)="dragStarted($event)"            
            (cdkDragReleased)="dragEnded($event)">
        </div>
        
    </div>    
    <div class="displayValue" 
            [ngStyle]="{ 'width': _sliderBarWidthVM, 'color': DisplayLabelColor, 
                         'font-family': DisplayLabelFontFamily, 
                         'font-size': DisplayLabelFontSize  
                       }" 
            *ngIf="IsDisplayLabel">
        
        <span>
            {{MinValue}}                
        </span>
        <span *ngIf="IsDisplayValue" [ngStyle]="{ 'color': DisplayValueForeColor }">
            {{Slider1Value}} - {{Slider2Value}}
        </span>
        <span>
            {{MaxValue}}
        </span>

    </div>
</div>
