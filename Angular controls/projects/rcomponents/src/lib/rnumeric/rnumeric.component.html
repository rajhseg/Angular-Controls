

<div  [style.font-family]="FontFamily" [id]="Id" [ngStyle]="{}" [ngStyle]="{ 'pointer-events': IsReadOnly ? 'none': '' }"
     style="display: flex;flex-direction: column;">  

    <div>
        <label [ngStyle]="{ 'color': LabelTextForeColor, 'font-size': FontSize }">{{LabelText}}</label>
    </div>

    <div style="display: flex;flex-direction: row-reverse;">

        <rtextbox [ReadOnly]="IsReadOnly" [TextBoxHeight]="TextBoxHeight" [EnableMarginTextBottom]="false" 
            [BottomLineColor]="BottomLineColor" [LabelText]="''" [FontSize]="FontSize"
            [LabelForeColor]="LabelTextForeColor" [TextBoxWidth]="TextBoxWidth" (focusout)="onBlur($event)"
            (keypress)="keyPress($event)"
            (paste)="onPaste($event)"
            [(ngModel)]="Value">
        </rtextbox>    

        <div class="buttons" [ngStyle]="{ 'padding-right' : '3px'}">
            <rbutton    
                        [ButtonHeight]="ButtonHeight"
                        [ButtonWidth]="'25px'"
                        [BackgroundColor]="MinusBackgroundColor" 
                        [ForeColor]="MinusForeColor" 
                        (ButtonClick)="Dec()" 
                        class="minus">&#9866;</rbutton>

            <rbutton    
                        [ButtonHeight]="ButtonHeight"
                        [ButtonWidth]="'25px'"
                        [BackgroundColor]="PlusBackgroundColor" 
                        [ForeColor]="PlusForeColor"
                        (ButtonClick)="Inc()" 
                        class="plus">&#10009;</rbutton>
                        
        </div>

    </div>
</div>
