<div  class="dropdown fileuploadclose"  [style.font-family]="FontFamily" [style.font-size]="FontSize" [id]="Id"
      [ngStyle]="{ 'pointer-events': (IsReadOnly || IsDisabled) ? 'none': '', 'user-select': IsDisabled ? 'none': 'auto' }">
    <input [hidden]="true" [multiple]="SelectMultipleFiles" [accept]="Accept" type="file" #rfile 
            (click)="blockFileBrowse($event)" (keydown)="blockFileBrowse($event)" 
            (change)="onFilesSelected($event)" />
    <div style="width: 285px;">
    <rgroup-panel [groupname]="'Files Upload'" [TitleForeColor]="TextForeColor" 
            [EnableShadowEffect]="EnableShadowEffect">
        <div #startElement style="display: flex;">
            <div class="rcontainer" 
                        [ngClass]="{ 'brdr': !EnableShadowEffect }"
                        [ngStyle]="{'border-bottom-color': IconForeColor, 
                                    'box-shadow': EnableShadowEffect ? 'rgba(0, 0, 0, 0.24) 0px 3px 8pxs' : ''}">
                <div class="displayText" [ngStyle]="{ 'color': TextForeColor }">{{DisplayText}}</div>
                <div *ngIf="Files.length > 0 || ErrorMessages.length > 0">
                    <span class="droppos" (click)="toggle($event)" #openbtn
                        [ngClass]="{ 'icon-down': !showFiles, 'icon-up': showFiles}"
                        [ngStyle]="{'color': IconForeColor}"></span>
                    <span (click)="clear($event)" class="closebtn" 
                            [ngStyle]="{'color': IconForeColor, 'font-size': '13px' }">
                            
                            <div>x</div>
                             
                    </span>
                </div>
            </div>
            
            <span class="bicon" (click)="browse($event)" 
                  [ngStyle]="{'color': IconForeColor}" 
                  [style.--upload-iconcolor]="IconForeColor">

                <div class="upload-icon">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="18" x2="12" y2="6"/>
                        <polyline points="7 11 12 6 17 11"/>
                        <path d="M5 18 L5 20 Q5 22 7 22 L17 22 Q19 22 19 20 L19 18"/>
                    </svg>
                </div>

            </span>

        </div>
        <div *ngIf="showFiles" class="tableContainer rfileuploaddropdownclose" id="dropdownId"
            [ngClass]="{'dropdown-content': ShowFilesAsDropdownContainer }"
            [ngStyle]="{ 'visibility':showFiles ? 'visible': 'collapse', 'height':'fit-content',
                '--tdsize': FontSize,
                'background-color': ShowFilesAsDropdownContainer ? 'white': '',
                'max-height':EnableMaximumHeightForShowFiles ? ShowFilesListMaximumHeight : ''}">
            <table class="tab" *ngIf="ErrorMessages.length == 0">   
                <thead>
                    <th style="width: 130px;overflow-wrap:anywhere;">Name</th>
                    <th style="width: 56px;overflow-wrap:anywhere;">Size</th>               
                </thead>
                <tbody class="">
                    <tr *ngFor="let item of Files" [ngStyle]="{ 'color': TextForeColor }">
                        <td style="width: 130px; overflow-wrap: anywhere; text-wrap: wrap;">{{item.name}}</td>
                        <td style="width: 56px;overflow-wrap:anywhere;">{{ formatSize(item.size) }}</td>                      
                    </tr>
                </tbody>
            </table>
            <table class="tab" *ngIf="ErrorMessages.length > 0">
                <thead>
                    <th style="width: 20px;overflow-wrap:anywhere;">No</th>
                    <th  style="width: 166px;overflow-wrap:anywhere;">Error Exceed Max Size {{AllowedMaxFileSizeInMB}} MB</th>
                </thead>
                <tbody>
                    <tr *ngFor="let ErrorMessage of ErrorMessages; let i = index" [ngStyle]="{ 'color': TextForeColor }">
                        <td style="width: 20px;overflow-wrap:anywhere;padding: 7px;">{{i + 1}}</td>
                        <td style="width: 166px; overflow-wrap: anywhere; text-wrap: wrap;">
                            {{ErrorMessage}}
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </rgroup-panel>
    </div>
</div>
