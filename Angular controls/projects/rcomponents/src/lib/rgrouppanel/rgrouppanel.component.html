<div class="group"  [style.font-family]="FontFamily" [id]="Id" 
    [ngStyle]="{
        'box-shadow': EnableShadowEffect ? 'rgba(0, 0, 0, 0.24) 0px 3px 8px':'',
        'pointer-events':(IsDisabled || IsReadOnly) ? 'none': '',
        'user-select': IsDisabled ? 'none': 'auto'
    }">
    <span class="grouptitle" [ngStyle]="{'color': TitleForeColor, 'font-size': FontSize }">{{groupname}}</span>
    <div [ngStyle]="{'display': IsItemsArrangeHorizontal ? 'flex' : ''}" class="tabcontent">
        <ng-content></ng-content>
    </div>
</div>
