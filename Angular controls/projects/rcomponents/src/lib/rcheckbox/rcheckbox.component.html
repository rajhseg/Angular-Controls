<div style="display: flex;cursor: pointer;align-items: center;" 
    [ngStyle]="{ 'font': Font, 'pointer-events':(IsDisabled || IsReadOnly) ? 'none': '' }"
     [style.font-family]="FontFamily" [id]="Id"  (click)="check($event)">
    
    <div *ngIf="!DisplayTextRightAlign" class="label" [ngStyle]="{ 'color': LabelColor, 'font-size': FontSize }">
        {{DisplayText}}
    </div>
    <div class="checkroot" [ngStyle]="{ 'font-size': CheckSize, 'width': CheckSize, 'height': CheckSize }">
        <span [ngStyle]="{ '--color' : CheckedColor }" [ngClass]="{'tickmark': IsChecked}">

        </span>
    </div>

    <div *ngIf="DisplayTextRightAlign" class="label" [ngStyle]="{ 'color': LabelColor, 'font-size': FontSize }">
        {{DisplayText}}
    </div>
</div>
