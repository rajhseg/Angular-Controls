  
  <div [id]="HostElementId">

    <div  [style.font-family]="FontFamily" [id]="Id" class="container" 
        [ngStyle]="{ 'width': TotalWidth, 'height': TotalHeight,    
                     'border': EnableBorder ? '0.8px solid '+ BorderColor : '',
                     'border-radius': '8px',
                     'flex-direction': SplitterType == RSType.Horizontal ? 'column' : '' }">

        <ng-container *ngFor="let item of RenderItems; trackBy:trackById">
            
            <ng-container *ngIf="item.IsSplitObj">
                <div [id]="item.Id" class="divider" [ngStyle]="{'background': SplitterBackgroundColor, 
                                    'height': item.InitialHeight, 'width': item.InitialWidth,
                                    'cursor': SplitterType == RSType.Vertical ? 'col-resize' : 'row-resize'}">
                </div>
            </ng-container>

            <ng-container *ngIf="!item.IsSplitObj">
                <div [id]="item.Id" class="panel" [ngStyle]="getPanelStyle(item.Id)">
                  <ng-content>

                  </ng-content>
                  <ng-container *ngTemplateOutlet="item.TemplateRef">
                        
                  </ng-container>
                </div>
            </ng-container>

        </ng-container>
    </div>
  </div>
