<div  [style.font-family]="FontFamily" [id]="Id" style="display: flex;" 
  [ngStyle]="{'pointer-events': (IsReadOnly || IsDisabled) ? 'none' : '', 'user-select': IsDisabled ? 'none': 'auto' }">
    <span class="font12" style="position:relative;padding-right:5px;" [ngStyle]="{'color': LabelForeColor, 'font-size': FontSize }">
      {{DisplayLabel}}
    </span>
    <label class="rswitch">
      <input [attr.readonly]="IsReadOnly || null" [attr.disabled]="IsDisabled || null" 
             (click)="blockTriggerChange($event)" (keydown)="blockTriggerChange($event)"
             type="checkbox" [checked]="isChecked" (change)="toggle()" checked>
      <span class="sdr round"  [ngStyle]="{ 'backgroundColor': isChecked ? SwitchBackColor : ''}"></span>
    </label>
  </div>
