


<div [id]="Id">
    <canvas #rbar width="{{Width + PaddingLeft + PaddingRight}}" height="{{Height + PaddingTop + PaddingBottom}}"
                [ngStyle]="{ 'border-radius': EnableBorder ? '5px' : '', 'border': EnableBorder ? '0.5px solid '+BorderColor : '' }">

    </canvas>
    <div *ngIf="IsRendered"  style="position: relative; align-content: center; margin-top:8px" 
            [ngStyle]="{'bottom': '10px', 'height': DataListHeight+'px'}">

        <div class="dataContainer" [ngStyle]="{'width': (Width - MarginX) +'px', 'left': (PaddingLeft + MarginX) + 'px'}">
            <div class="data" *ngFor="let itm of this.Columns; trackBy: trackById">
                
                <ng-container *ngIf="isPropString(itm.barItemsBackColor)">
                    <div class="indicator" [ngStyle]="{'backgroundColor': itm.barItemsBackColor }">       
                    </div>
                </ng-container>

                <ng-container *ngIf="!isPropString(itm.barItemsBackColor)" >
                    <div class="indicator" *ngFor="let clr of $any(itm.barItemsBackColor)"
                        [ngStyle]="{'backgroundColor': clr }">
                    </div>               
                </ng-container>
                                
                <span class="title" style="width: fit-content;">
                    {{itm.DisplayName}}
                </span>                
            </div>
        </div>     
           
    </div>
</div>
