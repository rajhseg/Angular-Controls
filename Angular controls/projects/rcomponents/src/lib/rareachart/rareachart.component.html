
<div  [style.font-family]="FontFamily" [id]="Id" [ngStyle]="{ 'pointer-events': IsDisabled ? 'none': '', 'user-select': IsDisabled ? 'none': 'auto' }">
    <canvas #rbar width="{{Width + PaddingRight + PaddingLeft}}" height="{{Height + PaddingBottom + PaddingTop}}"
            [ngStyle]="{ 'border-radius': EnableBorder ? '5px' : '', 'border': EnableBorder ? '0.5px solid '+BorderColor : '' }">

    </canvas>
    <div *ngIf="IsRendered"  style="position: relative; align-content: center;display: flex;flex-direction: row;" 
            [ngStyle]="{'bottom':  '10px', 'height': DataListHeight+'px'}">

        <div [ngStyle]="{'width': (MarginX + PaddingLeft) + 'px'}"></div>

        <div class="dataContainer" [ngStyle]="{ '--fontsize': FontSize, 'width': (Width - MarginX - PaddingLeft) +'px'}">
            <div class="data" *ngFor="let itm of this.Items; trackBy: trackById">
                <div class="indicator" [ngStyle]="{'backgroundColor': itm.ItemColor}">
                </div>
                <span class="title" style="width: fit-content;">{{itm.ItemName}}</span>
            </div>
        </div>  
        
        <div [ngStyle]="{'width': PaddingRight + 'px'}"></div>
    </div>
</div>
